<!DOCTYPE html>
<html>
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Messages</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="messages-container">
        <h1>List of Messages</h1>
        <div class="action-links">
            <a href="/send-message/" class="action-link">Send Message</a>
        </div>
        <table border="1" id="messagesTable">
            <tr>
                <th>ID</th>
                <th>Sender</th>
                <th>Receiver</th>
                <th>Content</th>
                <th>Status</th>
                <th>Timestamp</th>
                <th>Actions</th>
            </tr>
            {% for message in messages %}
            <tr>
                <td>{{ message.id }}</td>
                <td>{{ message.sender }}</td>
                <td>{{ message.receiver }}</td>
                <td>{{ message.content }}</td>
                <td>{{ message.status }}</td>
                <td>{{ message.timestamp }}</td>
                <td><a href="/messages/{{ message.id }}/" class="view-link">View</a></td>
            </tr>
            {% endfor %}
        </table>
       <a href="/logout/" class="logout-link">Logout</a>
    </div>
    <!-- Add JavaScript for page reloading -->
    <script>
        // Reload the page every 10 seconds (10000 ms)
        setTimeout(function() {
            window.location.reload();
        }, 10000); // Adjust the time (in milliseconds) as needed
    </script>
</body>
</html>
