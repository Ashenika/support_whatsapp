<!DOCTYPE html>
<html>
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Message</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="form-container">
        <h1>Send WhatsApp Message</h1>
        {% if success %}
            <p style="color:green;">{{ success }}</p>
        {% endif %}
        {% if error %}
            <p class="error-message" style="color:red">{{ error }}</p>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="user_number">Receiver`s Whatsapp Nnumber</label>
                <input
                    type="text"
                    id="user_number"
                    name="user_number"
                    placeholder="countrycode + number (e.g., 94123456789)"
                    required
                    pattern="^[1-9][0-9]{1,3}[0-9]{6,10}$"
                    title="Enter country code (without +) followed by the number. Example: 94123456789"
                />
            </div>
            <div class="form-group">
                <label for="message_body">Message</label>
                <textarea id="message_body" name="message_body" placeholder="Write your message here..." rows="4" required></textarea>
            </div>
            <button type="submit" class="btn">Send Message</button>
        </form>
        <div class="form-actions">
            <a href="/messages/" class="back-link">Back to List</a>
            <a href="/logout/" class="logout-link">Logout</a>
        </div>
    </div>
</body>
</html>
